<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frisk Jump - Aprenda Programar</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ================================================== -->
    <!-- AREA PRINCIPAL DO JOGO - Tudo acontece aqui dentro -->
    <!-- ================================================== -->
    <div class="jogo">

        <!-- PERSONAGEM - Mario que vai pular -->
        <img src="./img/frisk.gif" class="frisk" alt="Frisk">

        <!-- OBSTACULO - Cano que o Mario precisa pular -->
        <img src="./img/sans.gif" class="sans" alt="Sans">

        <!-- FUNDO - Nuvem que se move devagar -->
        <img src="./img/butterfly.gif" class="borboleta" alt="Borboleta">

        <!--
            PARA ADICIONAR MOEDA:
            <img src="moeda.png" class="moeda" alt="Moeda">
        -->

    </div>

    <!-- ================================================== -->
    <!-- TELA DE GAME OVER - Aparece quando o Mario bate -->
    <!-- ================================================== -->
    <div class="fim">
        <button class="reiniciar">JOGAR NOVAMENTE</button>
    </div>

    <!-- ================================================== -->
    <!-- INSTRUÇÕES NA TELA (opcional) -->
    <!-- ================================================== -->
    <div style="text-align: center; margin-top: 20px; font-family:Silkscreen;">
        <p> ▶ Pressione QUALQUER TELA ou CLIQUE para pular :D </p>
    </div>

</body>
</html>
